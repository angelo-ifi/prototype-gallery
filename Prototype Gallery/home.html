<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Angelo's Prototype Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:  #0a0a0a;
      --dark:   #0c0c0c;
      --navy:   #16213e;
      --accent: #00e5ff;
      --accent2: #b44fff;
      --yellow: #ffe600;
      --green:  #39ff14;
      --white:  #f0f0f0;
      --gray:   #888;
      --pixel:  'Inter', sans-serif;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--pixel);
      font-size: 14px;
      min-height: 100vh;
      padding: 100px 20px 64px;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.18) 2px,
          rgba(0,0,0,0.18) 4px
        );
    }

    /* stars — animated via canvas */
    #star-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      max-width: 1400px;
      margin: 0 auto 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .header-tag {
      display: inline-block;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 20px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    header h1 {
      font-size: clamp(14px, 3vw, 28px);
      color: #ff3ca0;
      text-shadow:
        4px 4px 0 #00e5ff,
        8px 8px 0 rgba(0,0,0,0.5);
      line-height: 1.6;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .header-sub {
      font-size: 14px;
      color: var(--accent);
      line-height: 2.2;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Solid divider */
    .divider {
      height: 4px;
      background: var(--accent);
      max-width: 1400px;
      margin: 0 auto 40px;
      box-shadow: 0 0 12px var(--accent);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 1800px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: #ffffff;
      border: 4px solid #1a1a2e;
      box-shadow: 6px 6px 0 var(--black);
      display: flex;
      flex-direction: column;
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
    }

    .card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--black);
    }

    /* ── THUMBNAIL ── */
    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 8;
      background: var(--black);
      border-bottom: 4px solid #1a1a2e;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      image-rendering: auto;
      transition: filter 0.2s;
    }

    .card-thumb.playable {
      cursor: pointer;
    }

    .card-thumb.playable:hover img {
      filter: brightness(0.45);
    }

    .card-thumb.playable:hover .play-overlay {
      opacity: 1;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .play-overlay-btn {
      font-family: var(--pixel);
      font-size: 15px;
      color: #ffffff;
      background: #0c0c0c;
      border: 3px solid var(--white);
      padding: 10px 18px;
      box-shadow: 4px 4px 0 var(--black);
      letter-spacing: 1px;
    }

    /* placeholder grid pattern */
    .card-thumb.empty {
      background-image:
        repeating-linear-gradient(0deg,   transparent, transparent 15px, #d0d0d8 15px, #d0d0d8 16px),
        repeating-linear-gradient(90deg,  transparent, transparent 15px, #d0d0d8 15px, #d0d0d8 16px);
      background-color: #e8e8f0;
    }

    .card-thumb.empty::after {
      content: '';
    }

    .card-thumb.coming-soon::after {
      content: 'COMING SOON';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #555;
      letter-spacing: 2px;
    }

    /* ── CARD HEADER ── */
    .card-header {
      padding: 8px 12px 8px;
      border-bottom: 4px solid #1a1a2e;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-number {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      color: #1a1a2e;
      line-height: 1.8;
      outline: none;
      padding: 2px 4px;
      margin: -2px -4px;
      transition: background 0.1s;
    }

    .card-title:empty::before { content: "ENTER TITLE"; color: #444; }
    .card-title:hover:not(:focus) { background: rgba(255,255,255,0.04); }
    .card-title:focus {
      background: rgba(0,0,0,0.4);
      box-shadow: inset 0 0 0 2px var(--yellow);
    }

    .card-audience {
      font-size: 15px;
      color: var(--gray);
      margin-top: 6px;
      line-height: 2;
    }

    .card-audience-text {
      outline: none;
      padding: 1px 3px;
      margin: -1px -3px;
      transition: background 0.1s;
    }

    .card-audience-text:empty::before { content: "???"; color: #444; }
    .card-audience-text:hover:not(:focus) { background: rgba(255,255,255,0.04); }
    .card-audience-text:focus {
      background: rgba(0,0,0,0.4);
      box-shadow: inset 0 0 0 2px var(--yellow);
    }

    /* Badge */
    .badge {
      font-size: 15px;
      padding: 4px 8px;
      border: 3px solid var(--gray);
      color: var(--gray);
      white-space: nowrap;
      flex-shrink: 0;
      background: #f0f0f0;
    }

    .badge.wip {
      border-color: var(--yellow);
      color: var(--yellow);
      animation: badgepulse 2s step-end infinite;
    }

    @keyframes badgepulse {
      0%, 100% { background: var(--black); }
      50%       { background: #2a1f00; }
    }

    /* ── CARD BODY ── */
    .card-body {
      padding: 8px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field { display: flex; flex-direction: column; gap: 3px; }

    .field-label {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }

    .field-value {
      font-size: 11px;
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 1.2em;
      outline: none;
      padding: 4px 6px;
      margin: -4px -6px;
      word-break: break-word;
      transition: background 0.1s, box-shadow 0.1s;
    }

    .field-value:empty::before {
      content: attr(data-placeholder);
      color: #444;
    }

    .field-value:hover:not(:focus) { background: rgba(255,255,255,0.04); }
    .field-value:focus {
      background: rgba(0,0,0,0.4);
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 8px 12px;
      border-top: 4px solid #1a1a2e;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--pixel);
      font-size: 14px;
      color: var(--gray);
      text-decoration: none;
      border: 3px solid var(--gray);
      padding: 6px 12px;
      background: #f0f0f0;
      pointer-events: none;
      opacity: 0.45;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .card-link.active {
      pointer-events: auto;
      opacity: 1;
      color: #ffffff;
      font-weight: 700;
      background: #ff6a00;
      border-color: #ff6a00;
      box-shadow: 3px 3px 0 var(--black);
    }

    .card-link.active:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--black);
    }

    .card-link.active:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--black);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green);
      color: var(--black);
      font-family: var(--pixel);
      font-size: 15px;
      padding: 10px 20px;
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
      z-index: 99;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      max-width: 1400px;
      margin: 56px auto 0;
      padding-top: 20px;
      border-top: 4px solid #333;
      font-size: 14px;
      color: var(--gray);
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 2.5;
    }

    footer span { color: var(--gray); }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    #modal.open { display: flex; }

    #modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
    }

    #modal-box {
      position: relative;
      z-index: 1;
      width: min(1848px, 98vw);
      height: min(1310px, 96vh);
      background: var(--black);
      border: 4px solid var(--white);
      box-shadow: 8px 8px 0 var(--black);
      display: flex;
      flex-direction: column;
    }

    #modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--navy);
      border-bottom: 4px solid var(--white);
      flex-shrink: 0;
    }

    #modal-title {
      font-size: 15px;
      color: var(--yellow);
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #modal-close {
      font-family: var(--pixel);
      font-size: 15px;
      background: #ff3ca0;
      color: var(--white);
      border: 3px solid var(--white);
      padding: 5px 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      flex-shrink: 0;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #modal-close:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }
    #modal-close:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }

    #modal-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #000;
    }

    [contenteditable]:focus { caret-color: var(--yellow); }

    /* ── FEEDBACK PANEL ── */
    .feedback-panel {
      border-top: 4px solid var(--white);
      background: #0d0d1f;
      display: none;
      flex-direction: column;
    }

    .feedback-panel.open { display: flex; }

    /* Tabs: Form / Responses */
    .fb-tabs {
      display: flex;
      border-bottom: 2px solid #2a2a4a;
    }

    .fb-tab {
      flex: 1;
      font-family: var(--pixel);
      font-size: 15px;
      padding: 10px;
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      letter-spacing: 1px;
      border-bottom: 3px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }

    .fb-tab.active {
      color: var(--yellow);
      border-bottom-color: var(--yellow);
    }

    /* Form pane */
    .fb-form {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .fb-question {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fb-question-label {
      font-size: 15px;
      color: var(--white);
      line-height: 1.8;
    }

    .fb-btn-group {
      display: flex;
      gap: 8px;
    }

    .fb-emoji-btn {
      font-size: 22px;
      background: #1a1a35;
      border: 3px solid #2a2a4a;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: border-color 0.1s, background 0.1s, transform 0.1s;
      line-height: 1;
    }

    .fb-emoji-btn:hover { border-color: var(--accent); transform: scale(1.1); }
    .fb-emoji-btn.selected { border-color: var(--yellow); background: #2a2a00; }

    /* GO / PIVOT / STOP buttons */
    .fb-dot-btn {
      font-family: var(--pixel);
      font-size: 15px;
      padding: 8px 14px;
      background: #0a0a1a;
      border: 3px solid #2a2a4a;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color 0.1s, background 0.1s, transform 0.1s, box-shadow 0.1s;
    }

    .fb-dot-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--black); }
    .fb-dot-btn.green  { color: #39ff14; }
    .fb-dot-btn.yellow { color: #ffe600; }
    .fb-dot-btn.red    { color: #ff3ca0; }
    .fb-dot-btn.green.selected  { border-color: #39ff14; background: #0a1f0a; box-shadow: 3px 3px 0 var(--black); }
    .fb-dot-btn.yellow.selected { border-color: #ffe600; background: #1f1a00; box-shadow: 3px 3px 0 var(--black); }
    .fb-dot-btn.red.selected    { border-color: #ff3ca0; background: #1f0010; box-shadow: 3px 3px 0 var(--black); }

    .fb-text-label {
      font-size: 15px;
      color: var(--white);
      line-height: 1.8;
    }

    .fb-text-label span { color: var(--gray); }

    .fb-textarea, .fb-name-input {
      background: #0a0a1a;
      border: 3px solid #2a2a4a;
      color: var(--white);
      font-family: var(--pixel);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      line-height: 2;
      width: 100%;
      transition: border-color 0.1s;
    }

    .fb-textarea { resize: vertical; min-height: 70px; }
    .fb-textarea:focus, .fb-name-input:focus { border-color: var(--accent); }
    .fb-textarea::placeholder, .fb-name-input::placeholder { color: #333; }

    .fb-submit-btn {
      font-family: var(--pixel);
      font-size: 14px;
      background: var(--accent);
      color: var(--black);
      border: 3px solid var(--white);
      padding: 10px 20px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
      align-self: flex-start;
    }

    .fb-submit-btn:hover { background: var(--yellow); transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); }
    .fb-submit-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }

    /* Responses pane */
    .fb-responses {
      display: none;
      flex-direction: column;
    }

    .fb-responses.visible { display: flex; }

    .fb-list {
      max-height: 280px;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) #111;
    }

    .fb-list:empty::after {
      content: 'NO RESPONSES YET...';
      font-size: 15px;
      color: #333;
      letter-spacing: 1px;
      padding: 8px 0;
    }

    .fb-entry {
      background: #12122a;
      border: 2px solid #2a2a4a;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fb-entry-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .fb-entry-name {
      font-size: 15px;
      color: var(--accent);
    }

    .fb-entry-date {
      font-size: 14px;
      color: #444;
    }

    .fb-entry-scores {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .fb-score-chip {
      font-size: 14px;
      color: var(--gray);
      background: #1a1a35;
      border: 1px solid #2a2a4a;
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .fb-entry-thoughts {
      font-size: 15px;
      color: var(--white);
      line-height: 2;
      word-break: break-word;
    }

    .fb-entry-delete {
      font-family: var(--pixel);
      font-size: 14px;
      color: #333;
      background: none;
      border: none;
      cursor: pointer;
      align-self: flex-end;
      transition: color 0.1s;
    }

    .fb-entry-delete:hover { color: #ff3ca0; }

    /* feedback toggle btn */
    .btn-feedback {
      font-family: var(--pixel);
      font-size: 14px;
      font-weight: 700;
      background: var(--black);
      color: var(--gray);
      border: 3px solid var(--gray);
      padding: 6px 12px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .btn-feedback:hover { color: #ffffff; background: #0c0c0c; border-color: #0c0c0c; }
    .btn-feedback.has-feedback { color: var(--yellow); border-color: var(--yellow); }

    #export-btn {
      font-family: var(--pixel);
      font-size: 14px;
      background: var(--black);
      color: var(--accent);
      border: 3px solid var(--accent);
      padding: 8px 18px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
    }

    #export-btn:hover { background: var(--accent); color: var(--black); transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); }
    #export-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>


<div class="grid" id="grid"></div>

<footer>
  8 PROTOTYPES &nbsp;·&nbsp; LAST UPDATED <span id="updated"></span><br>
</footer>

<div id="toast">✔ SAVED!</div>

<div id="modal">
  <div id="modal-backdrop"></div>
  <div id="modal-box">
    <div id="modal-bar">
      <span id="modal-title">LOADING...</span>
      <button id="modal-close" onclick="closeModal()">✕ CLOSE</button>
    </div>
    <iframe id="modal-frame" src="" allowfullscreen></iframe>
  </div>
</div>

<script>
  // ── STARS ─────────────────────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    const COUNT = 80;
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function randomStar() {
      return {
        x:       Math.random() * canvas.width,
        y:       Math.random() * canvas.height,
        size:    Math.random() < 0.7 ? 1 : 1.5,
        alpha:   Math.random(),
        speed:   0.003 + Math.random() * 0.012,
        dir:     Math.random() < 0.5 ? 1 : -1,
        phase:   Math.random() * Math.PI * 2,
      };
    }

    function init() {
      resize();
      stars = Array.from({ length: COUNT }, randomStar);
    }

    function draw(ts) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.alpha = 0.15 + 0.85 * (0.5 + 0.5 * Math.sin(s.phase + ts * s.speed));
        ctx.globalAlpha = s.alpha;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.round(s.x), Math.round(s.y), s.size, s.size);
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); stars.forEach(s => { s.x = Math.random() * canvas.width; s.y = Math.random() * canvas.height; }); });
    init();
    requestAnimationFrame(draw);
  })();

  const STORAGE_KEY = 'prototype-hub-data';

  const links = [
    "../The Four Horsemen/index.html",
    "../Away from Home/v2.html",
    "../Manga/story.html",
    "../CRU Interactive Audience Map/index.html",
    "https://drive.google.com/file/d/1uLvgUn90sQOksR0NPedyE98JUw7xYF66/view?usp=sharing", null, null, null,
  ];

  // Thumbnail images per prototype (relative paths or null)
  const thumbnails = [
    "Images/four-horsemen.png",
    "../Away from Home/Images/Screenshot 2026-03-30 at 12-14-09 Angelo's Prototype Gallery.png",
    "Images/Manga.png",
    "Images/Audience-map.png",
    "Images/country-prayer-videos.jpg", null, null, null,
  ];

  const thumbTexts = [null, null, null, null, null, "COMING SOON", "COMING SOON", "COMING SOON"];

  const defaults = [
    { number:"01", title:"The Four Horsemen – Animated Comic Zine Video and Website", audience:"", status:"wip", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"02", title:"Away from Home – A Text-based Adventure", audience:"", status:"wip", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"03", title:"The Dream Between – Animated Comic Strip", audience:"", status:"wip", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"04", title:"CRU Audience Map – Interactive Infographics", audience:"", status:"wip", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"05", title:"Country Prayer Videos", audience:"", status:"wip", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"06", title:"", audience:"", status:"placeholder", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"07", title:"", audience:"", status:"placeholder", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
    { number:"08", title:"", audience:"", status:"placeholder", problem:"", built:"", walkthrough:"", testing:"", questions:"", ifWorks:"" },
  ];

  const bodyFields = [
    { key: "audience",    label: "▸ Audience" },
    { key: "problem",     label: "▸ Problem / Pain Point" },
    { key: "questions",   label: "▸ Questions for Advisors" },
    { key: "ifWorks",     label: "▸ If This Works..." },
  ];

  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return defaults;
      const parsed = JSON.parse(saved);
      return defaults.map((def, i) => Object.assign({}, parsed[i] || {}, {
        number: def.number,
        title: def.title,
        status: def.status,
      }));
    } catch { return defaults; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showToast();
  }

  let toastTimer;
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  const prototypes = loadData();
  const grid = document.getElementById('grid');

  prototypes.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const badgeClass = p.status === 'wip' ? 'badge wip' : 'badge';
    const badgeText  = p.status === 'wip' ? '★ WIP' : '-- EMPTY';
    const href       = links[i];
    const thumb      = thumbnails[i];
    const linkClass  = href ? 'card-link active' : 'card-link';
    const linkHref   = href || '#';

    const thumbText = thumbTexts[i];
    const thumbHTML = thumb
      ? `<div class="card-thumb${href ? ' playable' : ''}" ${href ? `data-href="${href}" data-title="${p.title}"` : ''}>
           <img src="${thumb}" alt="Preview">
           ${href ? `<div class="play-overlay"><div class="play-overlay-btn">▶ PLAY DEMO</div></div>` : ''}
         </div>`
      : thumbText
      ? `<div class="card-thumb empty" style="display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Inter',sans-serif;font-size:12px;color:#555;padding:12px;line-height:1.6;">${thumbText}</div>`
      : `<div class="card-thumb empty"></div>`;

    card.innerHTML = `
      ${thumbHTML}
      <div class="card-header">
        <div style="flex:1;min-width:0">
          <div class="card-number">Project_${p.number}</div>
          <div class="card-title">${p.title}</div>
        </div>
        <span class="${badgeClass}">${badgeText}</span>
      </div>
      <div class="card-body">
        ${bodyFields.map(f => `
          <div class="field">
            <span class="field-label">${f.label}</span>
            <div class="field-value" contenteditable="true" spellcheck="false" data-key="${f.key}" data-placeholder="..."></div>
          </div>
        `).join('')}
      </div>
      <div class="card-footer" style="display:flex;gap:8px;align-items:center">
        <a class="${linkClass}" href="${linkHref}">▶ PLAY DEMO</a>
        <button class="btn-feedback" data-index="${i}">✎ FEEDBACK</button>
      </div>
      <div class="feedback-panel" id="feedback-${i}">
        <div class="fb-tabs">
          <button class="fb-tab active" data-panel="form-${i}">✎ LEAVE FEEDBACK</button>
          <button class="fb-tab" data-panel="responses-${i}">◈ RESPONSES (<span class="fb-count" data-index="${i}">0</span>)</button>
        </div>
        <div class="fb-form" id="form-${i}">
          <div class="fb-question">
            <div class="fb-question-label">Would you pay for this?</div>
            <div class="fb-btn-group">
              <button class="fb-emoji-btn" data-q="pay" data-v="yes">👍</button>
              <button class="fb-emoji-btn" data-q="pay" data-v="no">👎</button>
            </div>
          </div>
          <div class="fb-question">
            <div class="fb-question-label">Was it easy to use?</div>
            <div class="fb-btn-group">
              <button class="fb-emoji-btn" data-q="easy" data-v="yes">👍</button>
              <button class="fb-emoji-btn" data-q="easy" data-v="no">👎</button>
            </div>
          </div>
          <div class="fb-question">
            <div class="fb-question-label">Would you recommend this?</div>
            <div class="fb-btn-group">
              <button class="fb-emoji-btn" data-q="recommend" data-v="yes">👍</button>
              <button class="fb-emoji-btn" data-q="recommend" data-v="no">👎</button>
            </div>
          </div>
          <div class="fb-question">
            <div class="fb-question-label">Should we keep building this?</div>
            <div class="fb-btn-group">
              <button class="fb-dot-btn green"  data-q="keep" data-v="yes">GO</button>
              <button class="fb-dot-btn yellow" data-q="keep" data-v="maybe">PIVOT</button>
              <button class="fb-dot-btn red"    data-q="keep" data-v="no">STOP</button>
            </div>
          </div>
          <div class="fb-question">
            <div class="fb-text-label">Any thoughts? <span>(optional)</span></div>
            <textarea class="fb-textarea" placeholder="What stood out? What would you change?"></textarea>
          </div>
          <div class="fb-question">
            <div class="fb-text-label">Name <span>(optional)</span></div>
            <input class="fb-name-input" type="text" placeholder="Anonymous">
          </div>
          <button class="fb-submit-btn" data-index="${i}">▶ SUBMIT</button>
        </div>
        <div class="fb-responses" id="responses-${i}">
          <div class="fb-list" id="fb-list-${i}"></div>
        </div>
      </div>
    `;

    card.querySelectorAll('.field-value[data-key]').forEach(el => {
      const key = el.dataset.key;
      if (p[key]) el.innerText = p[key];
    });

    card.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('input', () => {
        prototypes[i][el.dataset.key] = el.innerText.trim();
        saveData(prototypes);
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
      });
    });

    const link = card.querySelector('.card-link.active');
    if (link) {
      link.addEventListener('click', e => {
        e.preventDefault();
        openModal(link.href, p.title || `Prototype ${p.number}`);
      });
    }

    const thumbEl = card.querySelector('.card-thumb.playable');
    if (thumbEl) {
      thumbEl.addEventListener('click', () => {
        openModal(thumbEl.dataset.href, thumbEl.dataset.title || `Prototype ${p.number}`);
      });
    }

    grid.appendChild(card);
  });

  document.getElementById('updated').textContent = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric'
  });

  function openModal(src, title) {
    document.getElementById('modal-frame').src = src;
    document.getElementById('modal-title').textContent = '▶ ' + title.toUpperCase();
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-frame').src = '';
    document.body.style.overflow = '';
  }

  document.getElementById('modal-backdrop').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── FEEDBACK ──────────────────────────────────────────────────────────────
  const FB_KEY = 'prototype-hub-feedback';

  function loadFeedback() {
    try { return JSON.parse(localStorage.getItem(FB_KEY)) || {}; }
    catch { return {}; }
  }

  function saveFeedback(fb) {
    localStorage.setItem(FB_KEY, JSON.stringify(fb));
  }

  const keepLabels = { yes: '🟢 Yes', maybe: '🟡 Maybe', no: '🔴 No' };

  function renderResponses(index) {
    const fb = loadFeedback();
    const entries = fb[index] || [];
    const list = document.getElementById(`fb-list-${index}`);
    list.innerHTML = '';

    entries.forEach((entry, j) => {
      const div = document.createElement('div');
      div.className = 'fb-entry';

      const scores = [
        entry.pay       != null ? `Pay: ${entry.pay === 'yes' ? '👍' : '👎'}` : null,
        entry.easy      != null ? `Easy: ${entry.easy === 'yes' ? '👍' : '👎'}` : null,
        entry.recommend != null ? `Recommend: ${entry.recommend === 'yes' ? '👍' : '👎'}` : null,
        entry.keep      != null ? `Keep: ${keepLabels[entry.keep]}` : null,
      ].filter(Boolean);

      div.innerHTML = `
        <div class="fb-entry-top">
          <span class="fb-entry-name">${entry.name || 'Anonymous'}</span>
          <span class="fb-entry-date">${entry.date}</span>
        </div>
        ${scores.length ? `<div class="fb-entry-scores">${scores.map(s => `<span class="fb-score-chip">${s}</span>`).join('')}</div>` : ''}
        ${entry.thoughts ? `<div class="fb-entry-thoughts">"${entry.thoughts}"</div>` : ''}
        <button class="fb-entry-delete" data-j="${j}">✕ DELETE</button>
      `;

      div.querySelector('.fb-entry-delete').addEventListener('click', () => {
        const fb2 = loadFeedback();
        fb2[index].splice(j, 1);
        saveFeedback(fb2);
        renderResponses(index);
        updateFeedbackBtn(index);
      });

      list.appendChild(div);
    });

    list.scrollTop = list.scrollHeight;
  }

  function updateFeedbackBtn(index) {
    const fb = loadFeedback();
    const count = (fb[index] || []).length;
    const btn = document.querySelector(`.btn-feedback[data-index="${index}"]`);
    const countEl = document.querySelector(`.fb-count[data-index="${index}"]`);
    if (btn) {
      btn.textContent = count > 0 ? `✎ FEEDBACK (${count})` : '✎ FEEDBACK';
      btn.classList.toggle('has-feedback', count > 0);
    }
    if (countEl) countEl.textContent = count;
  }

  // Toggle panel open/closed
  document.querySelectorAll('.btn-feedback').forEach(btn => {
    const i = parseInt(btn.dataset.index);
    updateFeedbackBtn(i);
    btn.addEventListener('click', () => {
      const panel = document.getElementById(`feedback-${i}`);
      panel.classList.toggle('open');
    });
  });

  // Tab switching
  document.querySelectorAll('.fb-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const panelId = tab.dataset.panel;
      const tabs = tab.closest('.fb-tabs').querySelectorAll('.fb-tab');
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      const fbPanel = tab.closest('.feedback-panel');
      fbPanel.querySelector('.fb-form') && (fbPanel.querySelector('.fb-form').style.display = 'none');
      fbPanel.querySelector('.fb-responses') && fbPanel.querySelector('.fb-responses').classList.remove('visible');

      const target = document.getElementById(panelId);
      if (panelId.startsWith('form-')) {
        target.style.display = 'flex';
      } else {
        target.classList.add('visible');
        const idx = parseInt(panelId.replace('responses-', ''));
        renderResponses(idx);
      }
    });
  });

  // Emoji / dot button selection (per form)
  document.querySelectorAll('.fb-form').forEach(form => {
    form.querySelectorAll('.fb-emoji-btn, .fb-dot-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.dataset.q;
        form.querySelectorAll(`[data-q="${q}"]`).forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  });

  // Submit
  document.querySelectorAll('.fb-submit-btn').forEach(btn => {
    const i = parseInt(btn.dataset.index);
    btn.addEventListener('click', () => {
      const form = document.getElementById(`form-${i}`);
      const getVal = q => form.querySelector(`[data-q="${q}"].selected`)?.dataset.v ?? null;

      const entry = {
        pay:       getVal('pay'),
        easy:      getVal('easy'),
        recommend: getVal('recommend'),
        keep:      getVal('keep'),
        thoughts:  form.querySelector('.fb-textarea').value.trim(),
        name:      form.querySelector('.fb-name-input').value.trim(),
        date: new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }),
      };

      const fb = loadFeedback();
      if (!fb[i]) fb[i] = [];
      fb[i].push(entry);
      saveFeedback(fb);

      // Reset form
      form.querySelectorAll('.fb-emoji-btn, .fb-dot-btn').forEach(b => b.classList.remove('selected'));
      form.querySelector('.fb-textarea').value = '';
      form.querySelector('.fb-name-input').value = '';

      updateFeedbackBtn(i);
      showToast();

      // Switch to responses tab
      const responsesTab = document.querySelector(`[data-panel="responses-${i}"]`);
      if (responsesTab) responsesTab.click();
    });
  });

  // ── EXPORT ────────────────────────────────────────────────────────────────
  document.getElementById('export-btn').addEventListener('click', () => {
    const data = loadData();
    const fb   = loadFeedback();

    // Inject saved data into defaults so the export is self-contained
    const exportedHTML = document.documentElement.outerHTML
      .replace(
        /const defaults = \[[\s\S]*?\];/,
        `const defaults = ${JSON.stringify(data, null, 4)};`
      )
      .replace(
        /\/\/ ── EXPORT[\s\S]*$/,
        `// Data exported on ${new Date().toLocaleString()}\n  localStorage.setItem('${STORAGE_KEY}', JSON.stringify(${JSON.stringify(data)}));\n  localStorage.setItem('${FB_KEY}', JSON.stringify(${JSON.stringify(fb)}));\n<` + `/script>\n</body>\n</html>`
      );

    const blob = new Blob([exportedHTML], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `prototype-gallery-export-${new Date().toISOString().slice(0,10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
    showToast();
  });
</script>
</body>
</html>
