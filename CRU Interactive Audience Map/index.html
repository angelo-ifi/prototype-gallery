<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0d1b2a;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: #1a2440;
  color: white;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid #2d3a5a;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}
.site-logo {
  font-family: 'Lora', serif;
  font-size: 1.35rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.02em;
}
.site-logo span { color: #fdb137; }
.header-sub {
  font-size: 0.72rem;
  color: #7a8fb5;
  margin-top: 2px;
  letter-spacing: 0.04em;
}
.legend {
  display: flex;
  gap: 18px;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.72rem;
  color: #9aaac5;
  font-weight: 500;
}
.legend-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  flex-shrink: 0;
}
.header-hint {
  font-size: 0.68rem;
  color: #5a6a85;
  background: rgba(255,255,255,0.05);
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid #2d3a5a;
}

/* ── MAP SECTION ── */
.map-section {
  padding: 174px 20px 16px;
  display: flex;
  justify-content: center;
}
.map-container {
  position: relative;
  width: 100%;
  max-width: 1320px;
  border-radius: 14px;
  overflow: visible;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.map-image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 14px;
}

/* ── SPRITES LAYER ── */
.sprites-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ── SPRITE WRAPPER ── */
.sprite-wrapper {
  position: absolute;
  pointer-events: all;
  cursor: pointer;
  transform: translate(-50%, -100%);
  z-index: 10;
}
.sprite-wrapper:hover { z-index: 50; }

/* Pulse ring */
.sprite-pulse {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 6px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.5;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
  50% { transform: translateX(-50%) scale(1.8); opacity: 0; }
}

/* Figure */
.sprite-figure {
  width: 38px;
  height: 56px;
  display: block;
  transition: transform 0.18s ease;
  filter: drop-shadow(0 2px 5px rgba(0,0,0,0.35));
}
.sprite-wrapper:hover .sprite-figure {
  transform: scale(1.25) translateY(-5px);
}

/* Arm raise on hover */
.sprite-figure .arm-l,
.sprite-figure .arm-r {
  transition: transform 0.25s ease;
  transform-box: view-box;
}
.sprite-wrapper:hover .sprite-figure .arm-l {
  transform: rotate(70deg);
  transform-origin: 20px 22px;
}
.sprite-wrapper:hover .sprite-figure .arm-r {
  transform: rotate(-70deg);
  transform-origin: 20px 22px;
}
.sprite-wrapper:hover .sprite-figure .arm-l.boat-arm {
  transform-origin: 27px 22px;
}
.sprite-wrapper:hover .sprite-figure .arm-r.boat-arm {
  transform-origin: 27px 22px;
}

/* ── THOUGHT BUBBLE ── */
.thought-bubble {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: #fffdf7;
  border-radius: 14px;
  padding: 10px 13px;
  width: 168px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  border: 1.5px solid #e8e0d0;
}
.sprite-wrapper:hover .thought-bubble {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
/* Tail */
.thought-bubble::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: #fffdf7;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.08));
}
.bubble-stage-label {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  margin-bottom: 5px;
}
.bubble-quote {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 0.71rem;
  color: #4a4035;
  line-height: 1.45;
}
.bubble-cta {
  font-size: 0.59rem;
  color: #a09080;
  margin-top: 6px;
  text-align: right;
  letter-spacing: 0.03em;
}

/* Bubble — below variant */
.sprite-wrapper[data-dir="below"] .thought-bubble {
  bottom: auto;
  top: calc(100% + 10px);
  transform: translateX(-50%) translateY(-6px);
}
.sprite-wrapper[data-dir="below"]:hover .thought-bubble {
  transform: translateX(-50%) translateY(0);
}
.sprite-wrapper[data-dir="below"] .thought-bubble::after {
  top: auto;
  bottom: 100%;
  border-top-color: transparent;
  border-bottom-color: #fffdf7;
}

/* Bubble — left variant (bubble floats left of sprite) */
.sprite-wrapper[data-dir="left"] .thought-bubble {
  bottom: 50%;
  left: auto;
  right: calc(100% + 12px);
  transform: translateY(40%) translateX(6px);
  width: 155px;
}
.sprite-wrapper[data-dir="left"]:hover .thought-bubble {
  transform: translateY(40%) translateX(0);
}
.sprite-wrapper[data-dir="left"] .thought-bubble::after {
  top: 40%;
  left: 100%;
  transform: translateY(-50%);
  border-top-color: transparent;
  border-left-color: #fffdf7;
}

/* ── SIDE PANEL ── */
.side-panel {
  position: fixed;
  top: 0; right: 0;
  width: 550px;
  height: 100vh;
  background: #fff;
  z-index: 1000;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -10px 0 50px rgba(0,0,0,0.25);
}
.side-panel.open { transform: translateX(0); }

.panel-header {
  padding: 22px 22px 18px;
  color: white;
  flex-shrink: 0;
  position: relative;
}
.panel-close {
  position: absolute;
  top: 14px; right: 14px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s;
  line-height: 1;
}
.panel-close:hover { background: rgba(255,255,255,0.38); }
.panel-category {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  opacity: 0.78;
  margin-bottom: 4px;
  font-weight: 600;
}
.panel-title {
  font-family: 'Lora', serif;
  font-size: 1.9rem;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.1;
}
.panel-definition {
  font-size: 0.82rem;
  opacity: 0.88;
  line-height: 1.55;
}

/* Tabs */
.panel-tabs {
  display: flex;
  background: #f8f8f8;
  border-bottom: 2px solid #efefef;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 11px 4px;
  border: none;
  background: none;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: #aaa;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.18s;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}
.tab-btn.active {
  color: #1a2440;
  border-bottom-color: #1a2440;
  background: #fff;
}
.tab-btn:hover:not(.active) { color: #666; }

/* Panel content */
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
  scroll-behavior: smooth;
}
.panel-content::-webkit-scrollbar { width: 4px; }
.panel-content::-webkit-scrollbar-track { background: #f5f5f5; }
.panel-content::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 2px; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.panel-quote {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 0.95rem;
  color: #333;
  border-left: 3px solid var(--sc, #999);
  padding-left: 13px;
  margin-bottom: 18px;
  line-height: 1.6;
}
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: #aaa;
  margin-bottom: 9px;
  margin-top: 18px;
}
.section-title:first-child { margin-top: 0; }

.bullet-list { list-style: none; padding: 0; }
.bullet-list li {
  padding: 6px 0 6px 18px;
  position: relative;
  font-size: 0.83rem;
  color: #444;
  line-height: 1.5;
  border-bottom: 1px solid #f5f5f5;
}
.bullet-list li::before {
  content: '▸';

  left: 2px;
  color: var(--sc, #999);
  font-size: 0.7rem;
  top: 8px;
}

.insight-card {

  margin-bottom: 7px;
  border-left: 3px solid var(--sc, #ccc);
}

  font-size: 0.82rem;
  color: #1a2440;

}
.insight-body {
  font-size: 0.82rem;
  color: #666;
  line-height: 1.45;
}

.overview-img {
  width: 100%;
  aspect-ratio: 16 / 6.4;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 16px;
  display: block;
}

.overview-img-placeholder {

}

.glance-tags {

  padding: 0;
  margin-bottom: 16px;
}
.glance-tag {
  display: block;
  font-size: 0.83rem;
  color: #444;

  border-bottom: 1px solid #f5f5f5;
}
.glance-tag::before {
  content: '▸';

}
.insights-list {
  display: flex;
  flex-direction: column;

}
.insight-row {
  font-size: 0.83rem;
  color: #555;
  line-height: 1.55;
}
.insight-row-title {
  font-weight: 600;
  color: #1a2440;
}

.engage-block { margin-bottom: 18px; }
.engage-head {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 0.82rem;
  color: #1a2440;

.engage-icon {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--sc, #999);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem;
  flex-shrink: 0;
}

/* Overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.42);
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.32s;
}
.overlay.active { opacity: 1; pointer-events: all; }

/* Footer */
.site-footer {
  text-align: center;
  padding: 14px;
  color: #3a4a5a;
  font-size: 0.7rem;
  background: #0d1b2a;
  border-top: 1px solid #1a2a3a;
}

/* ── TALK TAB ── */
.talk-intro {
  font-size: 0.8rem;
  color: #7a8fb5;
  margin-bottom: 14px;
}
.talk-questions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 18px;
}
.talk-q-btn {
  background: #f0f4ff;
  border: 1.5px solid #c5d0e8;
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 0.82rem;
  color: #1a2440;
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, border-color 0.15s;
  font-family: 'Inter', sans-serif;
}
.talk-q-btn:hover { background: #dce6ff; border-color: #aab8d8; }
.talk-q-btn.asked { opacity: 0.45; cursor: default; }
.talk-convo {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.talk-bubble {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 0.82rem;
  line-height: 1.5;
}
.talk-bubble-user {
  align-self: flex-end;
  background: #1a2440;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.talk-bubble-char {
  align-self: flex-start;
  background: #f5f5f0;
  color: #1a1a2e;
  border-bottom-left-radius: 4px;
  border-left: 3px solid var(--char-color, #888);
}
</style>

        { q: "Was there a moment you almost didn't share?", a: "Every time, honestly. There's always a voice saying 'not now, not here.' I've learned to push through it. The moment I open my mouth, it gets easier." },
        { q: "How did that first person respond?", a: "Better than I expected. They were curious. I think people are hungrier for real conversations than we assume. We just have to start them." }
      ]
    },
    { q: "What's the hardest part of staying consistent?", a: "Life gets busy. I have to stay intentional or I drift back into just... existing. It takes real effort to maintain.",
      follow: [
        { q: "What strategies help you stay intentional?", a: "I keep a short list of people I'm praying for specifically. That keeps them in front of me. And I check in with a friend who holds me accountable." },
        { q: "How do you encourage yourself when you drift?", a: "I look back at the conversations that mattered. That rekindles it. And I confess the drift honestly — to God, and sometimes to a friend." }
      ]
    }
  ],
  multiplying: [
    { q: "What drives you to keep making disciples?", a: "I've watched people's lives genuinely change. How could I not want that for everyone around me? It's not a duty — it's love.",
      follow: [
        { q: "Who was the first person you saw genuinely transformed?", a: "A guy in a small group I led. Came in skeptical, barely talking. Two years later he was leading his own group. Watching that happen — nothing like it." },
        { q: "How do you love people who resist or push back?", a: "I try to stay curious about them rather than frustrated. Resistance usually means something important is underneath it. I want to know what that is." }
      ]
    },
    { q: "How do you keep from burning out?", a: "It has to come from love, not obligation. The moment it becomes duty or performance, you're already in trouble. I stay close to Jesus.",
      follow: [
        { q: "What warning signs do you watch for in yourself?", a: "When I start measuring success numerically. When I stop enjoying the people and just focus on outcomes. That's my signal to slow down and pray." },
        { q: "What does your personal rhythm with Jesus look like?", a: "Mornings mostly. Bible, prayer, stillness. I protect that aggressively. If that's healthy, everything else tends to follow. If it's not, everything suffers." }
      ]
    },
    { q: "What's been your greatest joy in this journey?", a: "Watching someone I discipled go and disciple someone else. That's multiplication. That's what the whole thing is about.",
      follow: [
        { q: "What did that moment feel like when you first saw it happen?", a: "Like standing back and watching something you were only partially responsible for. That's the point — it's supposed to outgrow you. That felt right." },
        { q: "Where do you feel called to multiply next?", a: "Honestly, I'm asking that question a lot right now. There are new circles I haven't entered yet. I think the next chapter is outside my comfort zone." }
      ]
    }
  ]
};

    <circle cx="17" cy="8" r="1.3" fill="white"/>
    <circle cx="23" cy="8" r="1.3" fill="white"/>
    <circle cx="17.5" cy="8.4" r="0.65" fill="#222"/>
    <circle cx="23.5" cy="8.4" r="0.65" fill="#222"/>
    ${spriteMouth(s.pose)}
  </svg>`;
}

// ── RENDER SPRITES ──
const layer = document.getElementById('spritesLayer');
Object.keys(STAGES).forEach(key => {
  const s = STAGES[key];
  const shortQ = s.quote.length > 68 ? s.quote.slice(0,65)+'…' : s.quote;

  const el = document.createElement('div');
  el.className = 'sprite-wrapper';
  el.dataset.dir = s.dir;
  el.style.left = s.pos.x + '%';
  el.style.top  = s.pos.y + '%';

  el.innerHTML = `
    <div class="thought-bubble">
      <div class="bubble-stage-label" style="color:${s.color}">${s.name}</div>
      <div class="bubble-quote">"${shortQ}"</div>
      <div class="bubble-cta">Click to explore ↗</div>
    </div>
    ${buildSprite(key)}
    <div class="sprite-pulse" style="background:${s.color}"></div>
  `;

  el.addEventListener('click', () => openPanel(key));
  layer.appendChild(el);
});

// ── PANEL ──
const panel   = document.getElementById('sidePanel');
const overlay = document.getElementById('overlay');

function openPanel(key) {
  const s = STAGES[key];
  document.getElementById('panelCategory').textContent = s.category;
  document.getElementById('panelTitle').textContent    = s.name;
  document.getElementById('panelDef').textContent      = s.def;
  document.getElementById('panelHeader').style.background = s.color;
  document.getElementById('panelContent').style.setProperty('--sc', s.color);

  document.getElementById('tab-overview').innerHTML = `
    ${s.img ? `<img class="overview-img" src="${s.img}" alt="${s.name}">` : `<div class="overview-img-placeholder"></div>`}
    <blockquote class="panel-quote">"${s.quote}"</blockquote>
    <div class="glance-tags">${s.glance.map(g=>`<span class="glance-tag">${g}</span>`).join('')}</div>
  `;

  document.getElementById('tab-movement').innerHTML = `
    <div class="section-title">Movement Patterns</div>
    <ul class="bullet-list">${s.movement.map(m=>`<li>${m}</li>`).join('')}</ul>
  `;

  document.getElementById('tab-engage').innerHTML = `
    <div class="engage-block">
      <div class="engage-head"><div class="engage-icon">🙏</div>Pause &amp; Pray</div>
      <ul class="bullet-list">${s.pray.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="engage-block">
      <div class="engage-head"><div class="engage-icon">📋</div>Plan Your Next Steps</div>
      <ul class="bullet-list">${s.plan.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="engage-block">
      <div class="engage-head"><div class="engage-icon">⚠️</div>Cautions &amp; Encouragement</div>
      <ul class="bullet-list">${s.cautions.map(c=>`<li>${c}</li>`).join('')}</ul>
    </div>
  `;

  // Talk tab
  const talkTab = document.getElementById('tab-talk');
  talkTab.style.setProperty('--char-color', s.color);
  const qa = TALK[key] || [];
  talkTab.innerHTML = `
    <p class="talk-intro">Ask ${s.name} a question and hear their perspective.</p>
    <div class="talk-questions">${qa.map((item,i)=>`<button class="talk-q-btn" data-idx="${i}">${item.q}</button>`).join('')}</div>
    <div class="talk-convo"></div>
  `;
  const askedIdxs = new Set();
  const convo = talkTab.querySelector('.talk-convo');

  function renderTopLevel() {
    const remaining = qa.filter((_, i) => !askedIdxs.has(i));
    if (!remaining.length) return;
    const row = document.createElement('div');
    row.className = 'talk-questions';
    remaining.forEach((item, ri) => {
      const origIdx = qa.indexOf(item);
      const btn = document.createElement('button');
      btn.className = 'talk-q-btn';
      btn.textContent = item.q;
      btn.dataset.idx = origIdx;
      btn.dataset.item = JSON.stringify(item);
      row.appendChild(btn);
    });
    convo.appendChild(row);
    bindTopLevel(row.querySelectorAll('.talk-q-btn'));
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function addExchange(item, afterFn) {
    const uBubble = document.createElement('div');
    uBubble.className = 'talk-bubble talk-bubble-user';
    uBubble.textContent = item.q;
    const cBubble = document.createElement('div');
    cBubble.className = 'talk-bubble talk-bubble-char';
    cBubble.textContent = item.a;
    convo.appendChild(uBubble);
    convo.appendChild(cBubble);
    if (afterFn) afterFn();
    cBubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function bindFollowUp(buttons) {
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('asked')) return;
        btn.parentElement.querySelectorAll('.talk-q-btn').forEach(b => b.classList.add('asked'));
        const item = JSON.parse(btn.dataset.item);
        addExchange(item, () => renderTopLevel());
      });
    });
  }

  function bindTopLevel(buttons) {
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('asked')) return;
        const idx = parseInt(btn.dataset.idx);
        askedIdxs.add(idx);
        btn.parentElement.querySelectorAll('.talk-q-btn').forEach(b => b.classList.add('asked'));
        const item = JSON.parse(btn.dataset.item);
        addExchange(item, () => {
          if (item.follow && item.follow.length) {
            const followRow = document.createElement('div');
            followRow.className = 'talk-questions';
            item.follow.forEach(f => {
              const fb = document.createElement('button');
              fb.className = 'talk-q-btn';
              fb.textContent = f.q;
              fb.dataset.item = JSON.stringify(f);
              followRow.appendChild(fb);
            });
            convo.appendChild(followRow);
            bindFollowUp(followRow.querySelectorAll('.talk-q-btn'));
          }
        });
      });
    });
  }

  talkTab.querySelectorAll('.talk-q-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    btn.dataset.item = JSON.stringify(qa[idx]);
  });
  bindTopLevel(talkTab.querySelectorAll('.talk-q-btn'));

  // Reset tabs
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-tab="overview"]').classList.add('active');
  document.getElementById('tab-overview').classList.add('active');

  panel.classList.add('open');
  overlay.classList.add('active');
}

function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('active');
}

document.getElementById('panelClose').addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
